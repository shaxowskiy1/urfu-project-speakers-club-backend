databaseChangeLog:
  - changeSet:
      id: 0004
      author: loonklage
      changes:
        - createTable:
            tableName: speaker_roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: speaker_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: speaker_roles
            baseColumnNames: speaker_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_speaker_roles_users_speaker_id
            onDelete: CASCADE
        - createIndex:
            tableName: speaker_roles
            indexName: idx_speaker_roles_speaker_id
            columns:
              - column:
                  name: speaker_id
        - createIndex:
            tableName: speaker_roles
            indexName: idx_speaker_roles_name
            columns:
              - column:
                  name: name
