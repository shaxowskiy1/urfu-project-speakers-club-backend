databaseChangeLog:
  - changeSet:
      id: 0003
      author: loonklage
      changes:
        - createTable:
            tableName: lectures
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: talk_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: speaker_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: media_s3_key
                  type: VARCHAR(1024)
              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: lectures
            baseColumnNames: talk_id
            referencedTableName: talks
            referencedColumnNames: id
            constraintName: fk_lectures_talks_talk_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: lectures
            baseColumnNames: speaker_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_lectures_users_speaker_id
            onDelete: CASCADE
        - createIndex:
            tableName: lectures
            indexName: idx_lectures_talk_id
            columns:
              - column:
                  name: talk_id
        - createIndex:
            tableName: lectures
            indexName: idx_lectures_speaker_id
            columns:
              - column:
                  name: speaker_id
