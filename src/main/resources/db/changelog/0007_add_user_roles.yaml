databaseChangeLog:
  - changeSet:
      id: 0007
      author: loonklage
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_roles_users_user_id
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: user_roles
            columnNames: user_id, role
            constraintName: uq_user_roles_user_role

        - addCheckConstraint:
            tableName: user_roles
            constraintName: chk_user_roles_role
            definition: role IN ('ADMIN', 'DEVREL', 'SPEAKER', 'USER')

        - createIndex:
            tableName: user_roles
            indexName: idx_user_roles_user_id
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 0007-seed
      author: loonklage
      changes:
        - insert:
            tableName: user_roles
            columns:
              - column: {name: user_id, valueNumeric: 1}
              - column: {name: role, value: ADMIN}
              - column: {name: created_date, valueComputed: CURRENT_TIMESTAMP}
        - insert:
            tableName: user_roles
            columns:
              - column: {name: user_id, valueNumeric: 1}
              - column: {name: role, value: USER}
              - column: {name: created_date, valueComputed: CURRENT_TIMESTAMP}

        - insert:
            tableName: user_roles
            columns:
              - column: {name: user_id, valueNumeric: 2}
              - column: {name: role, value: DEVREL}
              - column: {name: created_date, valueComputed: CURRENT_TIMESTAMP}
        - insert:
            tableName: user_roles
            columns:
              - column: {name: user_id, valueNumeric: 2}
              - column: {name: role, value: USER}
              - column: {name: created_date, valueComputed: CURRENT_TIMESTAMP}

        - insert:
            tableName: user_roles
            columns:
              - column: {name: user_id, valueNumeric: 3}
              - column: {name: role, value: SPEAKER}
              - column: {name: created_date, valueComputed: CURRENT_TIMESTAMP}
        - insert:
            tableName: user_roles
            columns:
              - column: {name: user_id, valueNumeric: 3}
              - column: {name: role, value: USER}
              - column: {name: created_date, valueComputed: CURRENT_TIMESTAMP}
