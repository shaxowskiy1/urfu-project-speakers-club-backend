databaseChangeLog:
  - changeSet:
      id: 0008
      author: loonklage
      changes:
        - createTable:
            tableName: user_media
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: media_minio_key
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_media
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_media_users_user_id
            onDelete: CASCADE
        - createIndex:
            tableName: user_media
            indexName: idx_user_media_user_id
            columns:
              - column:
                  name: user_id
