databaseChangeLog:
  - changeSet:
      id: 0002
      author: loonklage
      changes:
        - sql:
            splitStatements: false
            sql: |
              DO $$
              BEGIN
                IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'user_role') THEN
                  CREATE TYPE user_role AS ENUM ('DEVELOPER', 'ANALYST');
                END IF;
                IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'conference_type') THEN
                  CREATE TYPE conference_type AS ENUM ('INTERNAL', 'EXTERNAL');
                END IF;
                IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'talk_format') THEN
                  CREATE TYPE talk_format AS ENUM ('TALK', 'WORKSHOP');
                END IF;
              END$$;
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: roles
                  type: user_role[]
                  defaultValueComputed: "'{}'::user_role[]"
                  constraints:
                    nullable: false
        - createTable:
            tableName: talks
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: speaker_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: talk_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: conference_type
                  type: conference_type
                  constraints:
                    nullable: false
              - column:
                  name: format
                  type: talk_format
                  constraints:
                    nullable: false
              - column:
                  name: activity_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: activity_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: talks
            baseColumnNames: speaker_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_talks_users_speaker_id
            onDelete: CASCADE
        - createIndex:
            tableName: talks
            indexName: idx_talks_speaker_id
            columns:
              - column:
                  name: speaker_id

