databaseChangeLog:
  - changeSet:
      id: 0002
      author: loonklage
      changes:
        - createTable:
            tableName: talks
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: speaker_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: talk_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: conference_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: format
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: activity_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: activity_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: talks
            baseColumnNames: speaker_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_talks_users_speaker_id
            onDelete: CASCADE
        - createIndex:
            tableName: talks
            indexName: idx_talks_speaker_id
            columns:
              - column:
                  name: speaker_id

